<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1080, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>S-TECH DID 모니터</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #080d14;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      display: flex;
      flex-direction: column;
      background: #080d14;
      overflow: hidden;
      position: relative;
    }

    /* ── 배경 장식 ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(220,38,38,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(220,38,38,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-top {
      position: absolute;
      width: 900px; height: 700px;
      background: radial-gradient(ellipse, rgba(220,38,38,.13) 0%, transparent 65%);
      top: -200px; right: -200px;
      pointer-events: none; z-index: 0;
    }
    .bg-glow-bottom {
      position: absolute;
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(29,78,216,.08) 0%, transparent 65%);
      bottom: 100px; left: -150px;
      pointer-events: none; z-index: 0;
    }
    .screen > *:not(.bg-grid):not(.bg-glow-top):not(.bg-glow-bottom) { position: relative; z-index: 1; }

    /* ════════════════════════════
       HEADER
    ════════════════════════════ */
    .header {
      flex-shrink: 0;
      padding: 48px 64px 36px;
    }

    /* 상단 바: 로고 + 시계 */
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    /* 로고 영역 */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .logo-img {
      height: 80px;
      width: auto;
      display: block;
      /* GIF 흰 배경 → 다크 배경과 어울리도록 믹스 블렌드 */
      mix-blend-mode: screen;
      filter: brightness(1.1) contrast(1.05);
    }

    /* 시계 */
    .datetime-area { text-align: right; }
    .dt-date {
      font-size: 1.5rem; font-weight: 400;
      color: #64748b; letter-spacing: .04em; margin-bottom: 6px;
    }
    .dt-time {
      font-size: 4.8rem; font-weight: 900;
      color: #f1f5f9;
      font-variant-numeric: tabular-nums; line-height: 1;
      letter-spacing: .04em;
    }

    /* ── 구분선 ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,38,38,.5) 30%, rgba(220,38,38,.5) 70%, transparent);
      margin-bottom: 36px;
    }

    /* ════════════════════════════
       환율 카드 — 히어로 블록
    ════════════════════════════ */
    .exrate-hero {
      background: linear-gradient(135deg, rgba(220,38,38,.12) 0%, rgba(127,29,29,.08) 50%, rgba(15,23,42,.0) 100%);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 24px;
      padding: 48px 64px;
      position: relative;
      overflow: hidden;
    }
    .exrate-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #dc2626 40%, #ef4444 60%, transparent);
    }
    /* 배경 USD 워터마크 */
    .exrate-hero::after {
      content: 'USD';
      position: absolute;
      right: 48px; top: 50%;
      transform: translateY(-50%);
      font-size: 12rem; font-weight: 900;
      color: rgba(220,38,38,.05);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .05em;
      pointer-events: none;
      line-height: 1;
    }

    .exrate-row-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .exrate-label-group { display: flex; align-items: center; gap: 20px; }
    .ex-flag { font-size: 3.8rem; line-height: 1; }
    .ex-currency-name { font-size: 3.2rem; font-weight: 900; color: #f1f5f9; letter-spacing: .06em; }
    .ex-pair { font-size: 1.35rem; color: #64748b; margin-top: 6px; font-weight: 400; }

    /* LIVE 배지 */
    .live-badge {
      display: inline-flex; align-items: center; gap: 9px;
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.3);
      border-radius: 99px; padding: 8px 20px;
      font-size: 1.2rem; font-weight: 700; color: #34d399;
      letter-spacing: .08em;
    }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #10b981;
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.6)} }

    /* 환율 숫자 — 최대한 임팩트 있게 */
    .exrate-value-block {
      display: flex;
      align-items: flex-end;
      gap: 0;
      line-height: 1;
    }
    .ex-won { font-size: 4rem; font-weight: 700; color: #ef4444; margin-right: 8px; line-height: 1.1; }
    .ex-num {
      font-size: 9rem; font-weight: 900;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-shadow: 0 0 60px rgba(239,68,68,.35), 0 0 120px rgba(239,68,68,.15);
      letter-spacing: -.02em;
    }
    .ex-krw { font-size: 2.8rem; font-weight: 500; color: #94a3b8; margin-left: 12px; line-height: 1.4; }

    .exrate-row-bottom {
      display: flex; align-items: center; justify-content: space-between; margin-top: 18px;
    }
    .exrate-chg {
      font-size: 1.9rem; font-weight: 700; letter-spacing: .02em;
      display: flex; align-items: center; gap: 8px;
    }
    .exrate-chg.up   { color: #f87171; }
    .exrate-chg.down { color: #60a5fa; }
    .exrate-chg.flat { color: #64748b; }
    .exrate-time { font-size: 1.2rem; color: #475569; }

    /* ════════════════════════════
       날씨 섹션
    ════════════════════════════ */
    .weather-section {
      flex: 1;
      padding: 0 64px;
      display: flex; flex-direction: column;
      min-height: 0;
    }

    .section-eyebrow {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .eyebrow-bar { width: 4px; height: 28px; background: #dc2626; border-radius: 2px; }
    .eyebrow-txt {
      font-size: 1.5rem; font-weight: 700; color: #94a3b8;
      letter-spacing: .16em; text-transform: uppercase;
    }

    /* 테이블 헤더 */
    .tbl-head {
      display: grid;
      grid-template-columns: 2fr 1.1fr 1.1fr 1.6fr;
      padding: 14px 40px;
      background: rgba(220,38,38,.06);
      border: 1px solid rgba(220,38,38,.15);
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .tbl-head span {
      font-size: 1.35rem; font-weight: 700; color: #64748b;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .tbl-head span:nth-child(2),
    .tbl-head span:nth-child(3) { text-align: center; }
    .tbl-head span:last-child    { text-align: right; }

    /* 도시 행 */
    .city-rows { display: flex; flex-direction: column; gap: 12px; flex: 1; }

    .city-card {
      background: rgba(15,23,42,.7);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 18px;
      padding: 24px 40px;
      display: grid;
      grid-template-columns: 2fr 1.1fr 1.1fr 1.6fr;
      align-items: center;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      transition: border-color .3s;
    }
    .city-card.highlight {
      background: rgba(220,38,38,.07);
      border-color: rgba(220,38,38,.28);
    }
    .city-card.highlight .city-name { color: #fca5a5; }

    .city-info { display: flex; align-items: center; gap: 18px; }
    .flag-wrap {
      width: 72px; height: 50px; border-radius: 8px;
      overflow: hidden; flex-shrink: 0;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
    }
    .flag-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .flag-emoji { font-size: 2.6rem; }

    .city-name { font-size: 2.4rem; font-weight: 700; color: #e2e8f0; }

    .icon-cell { display: flex; justify-content: center; align-items: center; }
    .icon-cell svg { width: 48px; height: 48px; }

    .temp-cell { display: flex; justify-content: center; align-items: baseline; gap: 3px; }
    .temp-num { font-size: 2.8rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .temp-num.hot  { color: #f87171; }
    .temp-num.warm { color: #fb923c; }
    .temp-num.cool { color: #60a5fa; }
    .temp-num.cold { color: #a5b4fc; }
    .temp-num.na   { color: #334155; }
    .temp-unit { font-size: 1.6rem; color: #64748b; }

    .time-cell {
      text-align: right;
      font-size: 2.8rem; font-weight: 700;
      color: #e2e8f0; font-variant-numeric: tabular-nums;
    }
    .time-ampm { font-size: 1.2rem; color: #64748b; margin-left: 4px; }

    /* ════════════════════════════
       FOOTER
    ════════════════════════════ */
    .footer {
      flex-shrink: 0;
      padding: 18px 64px 42px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,.05);
      margin-top: 8px;
    }
    .footer-left { display: flex; align-items: center; gap: 12px; }
    .footer-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: blink 2s infinite; }
    .footer-live-txt { font-size: 1.1rem; color: #475569; }
    .footer-note { font-size: 1.1rem; color: #334155; }
  </style>
</head>

  { id:'taiyuan',  name:'타이위안', emoji:'🇨🇳', img:'https://exc-web.vercel.app/_next/image?url=%2Ftaiyuan.png&w=256&q=75', tz:'Asia/Shanghai',   lat:37.8706, lon:112.5489 },
  { id:'taiwan',   name:'대만',    emoji:'🇹🇼', img:'https://exc-web.vercel.app/_next/image?url=%2Ftaiwan.png&w=256&q=75',  tz:'Asia/Taipei',     lat:25.0330, lon:121.5654 },
  { id:'dallas',   name:'댈러스',  emoji:'🇺🇸', img:'https://exc-web.vercel.app/_next/image?url=%2Fdallas.png&w=256&q=75',  tz:'America/Chicago', lat:32.7767, lon:-96.7970 },
];

const I = {
  sun:   `<svg viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
  moon:  `<svg viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>`,
  cloud: `<svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,
  rain:  `<svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6M8 14v6M12 16v6"/></svg>`,
  snow:  `<svg viewBox="0 0 24 24" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="m20 16-4-4 4-4M4 8l4 4-4 4M20 8l-4 4 4 4M4 16l4-4-4-4"/></svg>`,
  storm: `<svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></svg>`,
  fog:   `<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5h3m4 0h9M3 10h11m4 0h1M1 15h11m4 0h3M3 20h7m4 0h9"/></svg>`,
  na:    `<svg viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 9a3 3 0 0 1 5.12 2.12c0 2-3 3-3 3M12 17h.01"/></svg>`,
};

function getIcon(wmo, isDay) {
  if (wmo == null) return I.na;
  if (wmo === 0)   return isDay ? I.sun : I.moon;
  if (wmo <= 3)    return I.cloud;
  if (wmo <= 48)   return I.fog;
  if (wmo <= 67)   return I.rain;
  if (wmo <= 77)   return I.snow;
  if (wmo <= 82)   return I.rain;
  if (wmo <= 86)   return I.snow;
  if (wmo <= 99)   return I.storm;
  return I.na;
}

function tempClass(t) {
  if (t == null) return 'na';
  if (t >= 30) return 'hot';
  if (t >= 20) return 'warm';
  if (t >= 10) return 'cool';
  return 'cold';
}

const wx = {};
CITIES.forEach(c => { wx[c.id] = { temp: null, wmo: null, isDay: 1 }; });

function renderCities() {
  const now = new Date();
  document.getElementById('cityRows').innerHTML = CITIES.map(city => {
    const w = wx[city.id];
    const timeStr = now.toLocaleTimeString('ko-KR', {
      timeZone: city.tz, hour: '2-digit', minute: '2-digit', hour12: false
    });
    const localStr = now.toLocaleString('ko-KR', { timeZone: city.tz, hour: 'numeric', hour12: true });
    const ampm = localStr.startsWith('오전') ? 'AM' : localStr.startsWith('오후') ? 'PM' : '';
    const tempTxt = w.temp != null ? Math.round(w.temp) : '--';
    const tc = tempClass(w.temp);
    const hl = city.highlight ? ' highlight' : '';
    return `
      <div class="city-card${hl}">
        <div class="city-info">
          <div class="flag-wrap">
            <img src="${city.img}" alt="${city.emoji}" onerror="this.parentElement.innerHTML='<span class=flag-emoji>${city.emoji}</span>'"/>
          </div>
          <span class="city-name">${city.name}</span>
        </div>
        <div class="icon-cell">${getIcon(w.wmo, w.isDay)}</div>
        <div class="temp-cell">
          <span class="temp-num ${tc}">${tempTxt}</span>
          <span class="temp-unit">°C</span>
        </div>
        <div class="time-cell">${timeStr}<span class="time-ampm">${ampm}</span></div>
      </div>`;
  }).join('');
}

const WD = ['일','월','화','수','목','금','토'];
function updateClock() {
  const now = new Date();
  const localNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const ymd = now.toLocaleDateString('ko-KR', { timeZone:'Asia/Seoul', year:'numeric', month:'long', day:'numeric' });
  const hms = now.toLocaleTimeString('ko-KR', { timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  document.getElementById('koDate').textContent = `${ymd} (${WD[localNow.getDay()]})`;
  document.getElementById('koTime').textContent = hms;
}

let prevRate = null;
async function fetchRate() {
  let rate = null;
  try {
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD', { cache:'no-store' });
    if (r.ok) { const d = await r.json(); rate = d.rates?.KRW; }
  } catch(_) {}
  if (!rate) {
    try {
      const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW', { cache:'no-store' });
      if (r.ok) { const d = await r.json(); rate = d.rates?.KRW; }
    } catch(_) {}
  }
  if (!rate) return;
  document.getElementById('rateVal').textContent = Math.round(rate).toLocaleString('ko-KR');
  const el = document.getElementById('rateChg');
  if (prevRate !== null) {
    const diff = rate - prevRate;
    if (Math.abs(diff) < 0.3) {
      el.textContent = '전일 대비 변동 없음'; el.className = 'exrate-chg flat';
    } else if (diff > 0) {
      el.textContent = `▲ ${diff.toFixed(2)}원 상승`; el.className = 'exrate-chg up';
    } else {
      el.textContent = `▼ ${Math.abs(diff).toFixed(2)}원 하락`; el.className = 'exrate-chg down';
    }
  } else {
    el.textContent = 'USD 기준 실시간 매매 환율'; el.className = 'exrate-chg flat';
  }
  prevRate = rate;
  const t = new Date().toLocaleTimeString('ko-KR', { timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  document.getElementById('rateTime').textContent = '최종 갱신 ' + t;
}

async function fetchWeather() {
  await Promise.allSettled(CITIES.map(async city => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weathercode,is_day&timezone=auto`;
      const r = await fetch(url, { cache:'no-store' });
      if (!r.ok) return;
      const d = await r.json();
      wx[city.id] = { temp: d.current.temperature_2m, wmo: d.current.weathercode, isDay: d.current.is_day };
    } catch(_) {}
  }));
  renderCities();
}

/* ── 화면 자동 스케일 ── */
function autoScale() {
  const scaleX = window.innerWidth  / 1080;
  const scaleY = window.innerHeight / 1920;
  const scale  = Math.min(scaleX, scaleY);
  const el = document.querySelector('.screen');
  el.style.transformOrigin = 'top center';
  el.style.transform = `scale(${scale})`;
  el.style.position = 'absolute';
  el.style.top = '50%';
  el.style.left = '50%';
  el.style.marginTop = `-${1920/2}px`;
  el.style.marginLeft = `-${1080/2}px`;
}
autoScale();
window.addEventListener('resize', autoScale);

updateClock();
renderCities();
setInterval(() => { updateClock(); renderCities(); }, 1000);
fetchRate();
fetchWeather();
setInterval(fetchRate, 3 * 60 * 1000);
setInterval(fetchWeather, 10 * 60 * 1000);
</script>
